<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referências - NIO INTERNO</title>
    <link rel="shortcut icon" href="img/favicon1.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/estilo.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <style>
        .nav-link-custom { color: rgba(255,255,255,0.7) !important; font-weight: 600; padding: 8px 18px !important; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-link-custom:hover { color: white !important; background: rgba(255,255,255,0.1); }
        .nav-link-custom.active { color: white !important; background: rgba(255,255,255,0.2); box-shadow: inset 0 -2px 0 #ffc107; }
        .header-azul { background-color: var(--azul); color: white; padding: 15px; font-weight: bold; border-radius: 12px 12px 0 0; text-transform: uppercase; }
        @media (min-width: 993px) { .navbar-menu-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; } }
        @media (max-width: 992px) {
            .navbar .container-fluid { flex-wrap: wrap; }
            .navbar-menu-center { display: flex !important; flex-wrap: wrap; gap: 8px; margin-top: 10px; width: 100%; justify-content: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top" style="background-color: var(--azul); padding: 10px 20px;">
        <div class="container-fluid px-lg-5 position-relative">
            <span class="navbar-brand fw-bold fs-4">
                <i class="bi bi-shield-lock-fill me-2 text-warning"></i>NIO <span class="fw-light opacity-75">INTERNO</span>
            </span>
            <div class="navbar-menu-center">
                <a class="nav-link-custom" href="painel.html">Pedidos</a>
                <a class="nav-link-custom active" href="referencias.html">Referências</a>
                <a class="nav-link-custom" href="relatorios.html">Relatórios</a>
            </div>
            <div class="d-flex align-items-center text-white ms-auto">
                <span class="me-3 d-none d-sm-inline opacity-75 small">Olá, <strong id="nomeUsuario">...</strong></span>
                <button onclick="sair()" class="btn btn-sm btn-outline-light rounded-pill px-3 fw-bold">SAIR</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4 px-lg-5">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm mb-3"><div class="card-body"><label class="fw-bold text-primary mb-2">ORGANIZAÇÃO</label><div class="input-group"><select id="selectOrganizacao" class="form-select fw-bold" onchange="filtrarPorOrg()"><option>Carregando...</option></select><button class="btn btn-success" onclick="abrirModalNovaOrg()">+</button></div></div></div>
                <div class="card border-0 shadow-sm"><div class="header-azul">Adicionar Referência</div><div class="card-body"><form id="formNovaRef" onsubmit="adicionarReferencia(event)"><div class="mb-3"><label class="small fw-bold">DATA</label><input type="text" id="novaData" class="form-control" placeholder="DD/MM/AAAA" required></div><div class="mb-3"><label class="small fw-bold">DESCRIÇÃO</label><textarea id="novaDescricao" class="form-control" rows="3" required></textarea></div><button type="submit" class="btn btn-primary w-100 fw-bold">SALVAR</button></form></div></div>
            </div>
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm h-100"><div class="header-azul d-flex justify-content-between"><span>REFERÊNCIAS</span><span id="contadorReg" class="badge bg-light text-primary">0</span></div><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>Data</th><th>Descrição</th><th class="text-center">Ação</th></tr></thead><tbody id="tabelaRefs"></tbody></table></div></div>
            </div>
        </div>
    </div>

    <!-- Modal Nova Org -->
    <div class="modal fade" id="modalNovaOrg" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow"><div class="modal-header bg-success text-white"><h5>Nova Organização</h5></div><div class="modal-body"><input type="text" id="nomeNovaOrg" class="form-control text-uppercase"></div><div class="modal-footer"><button class="btn btn-success w-100" onclick="confirmarNovaOrg()">CRIAR</button></div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const URL_API = 'https://script.google.com/macros/s/AKfycbwVD_orbvEi-LEMaItNI7Fd4-NvCfEEvER5wGeWvJETnjJqK_4T6eD9IC7mD4bcJYkh/exec';
        let dadosCompletos = [];
        const usuarioFull = localStorage.getItem('nio_usuario') || "Servidor";
        const nFormatado = usuarioFull.split(' ')[0].toLowerCase().replace(/^\w/, c => c.toUpperCase());
        document.getElementById('nomeUsuario').innerText = nFormatado;

        function sair() { localStorage.clear(); window.location.href = 'login.html'; }
        $(document).ready(function(){ $('#novaData').mask('00/00/0000'); carregarTudo(); });

        async function carregarTudo() {
            const res = await fetch(URL_API + '?acao=listar_referencias_completa');
            const data = await res.json();
            if(data.result === 'success') { 
                dadosCompletos = data.referencias;
                const orgs = [...new Set(dadosCompletos.map(i => i[0]))].sort();
                const sel = document.getElementById('selectOrganizacao');
                sel.innerHTML = '<option value="">SELECIONE...</option>';
                orgs.forEach(o => { if(o) sel.innerHTML += `<option value="${o}">${o}</option>`; });
            }
        }

        function filtrarPorOrg() {
            const org = $('#selectOrganizacao').val();
            const filtrados = dadosCompletos.filter(i => i[0] === org);
            $('#contadorReg').text(filtrados.length);
            document.getElementById('tabelaRefs').innerHTML = filtrados.map(i => `<tr><td>${i[1]}</td><td>${i[2]}</td><td class="text-center"><button class="btn btn-sm text-danger border-0" onclick="excluirRef('${i[3]}')"><i class="bi bi-trash-fill"></i></button></td></tr>`).join('');
        }

        async function adicionarReferencia(e) {
            e.preventDefault();
            const org = $('#selectOrganizacao').val();
            if(!org) return alert("Selecione a org.");
            const dados = { acao: 'nova_referencia', organizacao: org, data: $('#novaData').val(), referencia: $('#novaDescricao').val(), responsavel: usuarioFull };
            await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });
            location.reload();
        }

        async function excluirRef(id) { if(confirm("Excluir?")) { await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({acao:'excluir_referencia', id:id}) }); location.reload(); } }
        function abrirModalNovaOrg() { new bootstrap.Modal(document.getElementById('modalNovaOrg')).show(); }
        function confirmarNovaOrg() { const n = $('#nomeNovaOrg').val().toUpperCase(); if(n) { $('#selectOrganizacao').append(`<option value="${n}">${n}</option>`).val(n); bootstrap.Modal.getInstance(document.getElementById('modalNovaOrg')).hide(); } }
    </script>
</body>
</html>
